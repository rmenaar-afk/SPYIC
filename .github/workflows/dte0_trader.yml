name: 0DTE Iron Condor Trader

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 9:30 AM ET (UTC-5) Mon–Fri
  workflow_dispatch:            # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 360        # 6 hours max (covers full trading session)

    env:
      ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GMAIL_USER:        ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
      NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 0DTE trader
        run: |
          mkdir -p logs
          python dte0_trader.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
