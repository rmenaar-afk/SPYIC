name: 0DTE Iron Condor — Close

on:
  schedule:
    # CLOSE job: wakes ~1 hour before the 4:00 PM ET close, cancels the resting
    # take-profit and flattens anything still open. State is reconstructed from
    # Alpaca positions, so this is fully independent of the entry job.
    #
    # We fire ~1h early at 2:00 ET; the script's wait_until(15:00 ET) holds it to
    # exactly 3:00 PM ET, absorbing scheduler jitter. GitHub cron is UTC, no DST —
    # adjust the hour by season:
    #   summer (EDT, UTC-4): '0 18 * * 1-5'  = 2:00 PM EDT
    #   winter (EST, UTC-5): '0 19 * * 1-5'  = 2:00 PM EST
    - cron: '0 18 * * 1-5'    # 2:00 PM EDT, Mon–Fri (summer)
  workflow_dispatch:            # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  close:
    runs-on: ubuntu-latest
    # Fire at 2:00 ET, wait to 3:00 ET, flatten — ~1h + slack. Well under the 6h cap.
    timeout-minutes: 120

    env:
      ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GMAIL_USER:        ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
      NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 0DTE trader (close)
        run: |
          mkdir -p logs
          python dte0_trader.py close

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-close-${{ github.run_id }}
          path: logs/
          retention-days: 30
